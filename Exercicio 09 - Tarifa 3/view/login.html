<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Login</title>

        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #4facfe, #00f2fe);
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                margin: 0;
            }

            .container {
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
                text-align: center;
                width: 250px;
            }

            input {
                width: 95%;
                padding-left: 5%;
                padding-block: 10px;
                margin: 8px 0;
                border-radius: 8px;
                border: 1px solid #ccc;
                outline: none;
                transition: 0.3s;
            }

            input:focus {
                border-color: #4facfe;
            }

            button {
                width: 100%;
                padding: 10px;
                background: #4facfe;
                border: none;
                border-radius: 8px;
                color: white;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
            }

            button:hover {
                background: #007bff;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h2>Login</h2>
            <input type="text" placeholder="Usuário" id="user">
            <input type="password" placeholder="Senha" id="pass">
            <button onclick="entrar()">Entrar</button>
        </div>

        <script src="../public/script.js"></script>
    </body>
</html>

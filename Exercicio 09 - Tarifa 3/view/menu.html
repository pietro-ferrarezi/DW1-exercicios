<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Menu</title>

        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #43e97b, #38f9d7);
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                margin: 0;
            }

            .container {
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
                text-align: center;
                width: 250px;
            }

            h1 {
                margin-bottom: 20px;
            }

            button {
                width: 100%;
                padding: 10px;
                margin: 8px 0;
                border: none;
                border-radius: 8px;
                background: #43e97b;
                color: white;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
            }

            button:hover {
                background: #2ecc71;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h1>Menu</h1>
            <button>Opção 1</button>
            <button>Opção 2</button>
            <button>Opção 3</button>
        </div>
    </body>
</html>

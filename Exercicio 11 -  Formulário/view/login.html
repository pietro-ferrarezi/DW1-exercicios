<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro do Atleta</title>
    <link rel="stylesheet" href="../public/login.css">
</head>
<body>

<h2>Cadastro para Torneio Esportivo</h2>

<form id="formCadastro">
    <label>CPF:</label>
    <input type="text" id="cpf" required>

    <label>Nome Completo:</label>
    <input type="text" id="nome" required>

    <label>Idade:</label>
    <input type="number" id="idade" required>

    <label>Nome do Responsável:</label>
    <input type="text" id="responsavel" required>

    <label>Cidade de Origem:</label>
    <input type="text" id="origem" required>

    <label>Cidade de Destino:</label>
    <input type="text" id="destino" required>

    <label>Modalidade:</label>
    <select id="modalidade" required>
        <option value="">Selecione</option>
        <option value="Vôlei">Vôlei</option>
        <option value="Futebol">Futebol</option>
        <option value="Natação">Natação</option>
    </select>

    <button type="submit">Cadastrar</button>
</form>

<p id="mensagem"></p>

<script src="../public/login.js"></script>
</body>
</html>
